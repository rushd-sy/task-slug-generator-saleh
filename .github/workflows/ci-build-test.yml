name: build and test

on:
  push:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check Code
        uses: actions/checkout@v4

      - name: Setup dot NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SlugGenerator.slnx

      - name: Build solution
        run: dotnet build SlugGenerator.slnx --configuration Release --no-restore

      - name: Tests
        run: dotnet test SlugGenerator.slnx --configuration Release --no-build --verbosity normal
